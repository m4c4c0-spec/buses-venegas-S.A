server:
  port: ${PORT:8081}

spring:
  mail:
    host: smtp.gmail.com
    port: 465
    protocol: smtps
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtps:
          auth: true
        smtp:
          ssl:
            enable: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/buses}
    username: ${SPRING_DATASOURCE_USERNAME:buses}
    password: ${SPRING_DATASOURCE_PASSWORD:buses}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true
  flyway:
    enabled: false

management.endpoints.web.exposure.include: health,info

mercadopago:
  access-token: ${MERCADOPAGO_ACCESS_TOKEN}

blockchain:
  rpc-url: ${BLOCKCHAIN_RPC_URL}
  private-key: ${BLOCKCHAIN_PRIVATE_KEY}
  contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS:0x00}
